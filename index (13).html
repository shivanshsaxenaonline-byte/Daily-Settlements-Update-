<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kamour Sales Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--p:#FF6B35;--b:#2563EB;--g:#16A34A;--pu:#7C3AED;--t:#0D9488;--o:#D97706;--r:#DC2626;--bg:#EEF2F7;--card:#fff;--tx:#1E293B;--mu:#64748B;--bd:#E2E8F0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
body::before{content:"";position:fixed;top:0;left:0;width:100vw;height:100vh;background:radial-gradient(at 0% 0%,rgba(255,107,53,0.15) 0px,transparent 50%),radial-gradient(at 100% 0%,rgba(37,99,235,0.15) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(124,58,237,0.15) 0px,transparent 50%),radial-gradient(at 0% 100%,rgba(22,163,74,0.15) 0px,transparent 50%);z-index:-1;pointer-events:none;}
.hdr{background:linear-gradient(135deg,rgba(15,12,41,.94),rgba(48,43,99,.9),rgba(36,36,62,.94));color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.hdr-l h1{font-size:21px;font-weight:900;letter-spacing:0;}.hdr-l h1 span{color:#fff !important;text-shadow:0 2px 12px rgba(255,107,53,.45),0 1px 2px rgba(0,0,0,.55);font-weight:900 !important;}
.hdr-l p{font-size:12px;opacity:.6;margin-top:3px;}
.hdr-badge{background:linear-gradient(135deg,rgba(255,107,53,.98),rgba(255,133,78,.78));padding:8px 22px;border-radius:999px;font-size:13px;font-weight:900;border:1px solid rgba(255,255,255,.42);box-shadow:0 10px 26px rgba(255,107,53,.36),inset 1px 1px 2px rgba(255,255,255,.45),inset -1px -1px 2px rgba(0,0,0,.1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.ctrl{background:rgba(238,242,247,0.52);backdrop-filter:blur(72px) saturate(1.25);-webkit-backdrop-filter:blur(72px) saturate(1.25);border-bottom:none;padding:10px 28px 8px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.mode{display:inline-flex;position:relative;background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.28));border:1px solid rgba(255,255,255,.78);border-radius:14px;padding:4px;box-shadow:8px 8px 18px rgba(15,23,42,.05),-8px -8px 18px rgba(255,255,255,.85),inset 2px 2px 4px rgba(255,255,255,.9),inset -2px -2px 4px rgba(15,23,42,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.mode-pill{position:absolute;top:4px;left:4px;background:linear-gradient(135deg,rgba(255,107,53,.98),rgba(255,133,78,.78));border:1px solid rgba(255,255,255,.36);border-radius:10px;box-shadow:0 10px 22px rgba(255,107,53,.34),inset 1px 1px 2px rgba(255,255,255,.45),inset -1px -1px 2px rgba(0,0,0,.1);pointer-events:none;z-index:1;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:all .46s cubic-bezier(0.68,-0.55,0.26,1.55);}
.mode button{position:relative;z-index:2;border:none;background:transparent;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;color:var(--mu);cursor:pointer;transition:color .28s ease,font-weight .28s ease,transform .28s ease;}
.mode button:hover{color:var(--p);transform:translateY(-1px);}
.mode button.on{color:#fff;font-weight:900;}
.mode button.on:hover{color:#fff;transform:none;}
.pick{display:inline-flex;align-items:center;gap:8px;}
.pick label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-right:4px;}
.pick select,.pick input{padding:10px 40px 10px 16px;border:1px solid rgba(255,255,255,0.78);background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.28));border-radius:14px;font-size:13px;font-weight:800;color:var(--tx);font-family:inherit;cursor:pointer;box-shadow:8px 8px 18px rgba(15,23,42,.05),-8px -8px 18px rgba(255,255,255,.85),inset 2px 2px 4px rgba(255,255,255,.9),inset -2px -2px 4px rgba(15,23,42,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.pick select:focus,.pick input:focus{outline:none;border-color:rgba(255,107,53,.55);box-shadow:0 10px 22px rgba(255,107,53,.18),inset 1px 1px 2px rgba(255,255,255,.45),inset -1px -1px 2px rgba(0,0,0,.08);}
.wd-badge{background:rgba(238,242,255,0.6);color:var(--pu);padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-left:8px;border:1px solid rgba(255,255,255,0.8);}
.tabs{background:rgba(238,242,247,0.52);backdrop-filter:blur(72px) saturate(1.25);-webkit-backdrop-filter:blur(72px) saturate(1.25);border:none;padding:10px 28px 14px 28px;display:flex;overflow-x:auto;gap:12px;position:relative;scrollbar-width:none;-ms-overflow-style:none;}
.tab-pill {position:absolute;top:0;left:0;background:linear-gradient(135deg,rgba(255,107,53,.98),rgba(255,133,78,.78));border:1px solid rgba(255,255,255,.36);border-radius:24px;box-shadow:0 10px 22px rgba(255,107,53,.34),inset 1px 1px 2px rgba(255,255,255,.45),inset -1px -1px 2px rgba(0,0,0,.1);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:1;pointer-events:none;}
.tb{position:relative;z-index:2;padding:12px 20px;border-radius:24px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--mu);white-space:nowrap;transition:all .3s cubic-bezier(.25,.8,.25,1);}
.tb:hover{color:var(--p);}
.tb.act{background:transparent !important;color:#fff !important;border-color:transparent !important;box-shadow:none !important;}
.tb.act:hover{transform:none;color:#fff !important;}
.area{padding:22px 28px;display:flex;flex-direction:column;}
.area>*{flex-shrink:0;}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kg5{grid-template-columns:repeat(5,1fr);}
.kpi{background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(255,255,255,.38) 100%);border-radius:18px;padding:18px 20px;box-shadow:8px 8px 20px rgba(0,0,0,0.03),-8px -8px 20px rgba(255,255,255,0.8),inset 2px 2px 4px rgba(255,255,255,0.9),inset -2px -2px 4px rgba(0,0,0,0.01);border:1px solid rgba(255,255,255,.9);border-top:4px solid transparent;position:relative;overflow:hidden;transition:all .3s cubic-bezier(.25,.8,.25,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.kpi:hover{transform:translateY(-4px) scale(1.01);box-shadow:12px 12px 24px rgba(0,0,0,0.05),-12px -12px 24px rgba(255,255,255,0.9),inset 2px 2px 6px rgba(255,255,255,1),inset -2px -2px 6px rgba(0,0,0,0.02);}
.kpi.p{border-top-color:var(--p)}.kpi.b{border-top-color:var(--b)}.kpi.g{border-top-color:var(--g)}.kpi.pu{border-top-color:var(--pu)}.kpi.t{border-top-color:var(--t)}.kpi.o{border-top-color:var(--o)}.kpi.r{border-top-color:var(--r)}
.kl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);}
.kv{font-size:24px;font-weight:800;margin:7px 0 4px;}
.kn{font-size:11px;color:var(--mu);}
.ki{position:absolute;right:14px;top:14px;font-size:30px;opacity:.1;}
.kpi.navy{background:linear-gradient(135deg,#1e293b,#334155);border-top-color:var(--p);}
.kpi.navy .kl,.kpi.navy .kn{color:#cbd5e1;}.kpi.navy .kv{color:#fff;}
tr.best{background:#F0FDF4;}tr.low{background:#FEF2F2;}
tr.tot td{background:#1e293b;color:#fff;font-weight:800;border:none;}
.cb{background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(255,255,255,.38) 100%);border-radius:18px;padding:20px;box-shadow:8px 8px 20px rgba(0,0,0,0.03),-8px -8px 20px rgba(255,255,255,0.8),inset 2px 2px 4px rgba(255,255,255,0.9),inset -2px -2px 4px rgba(0,0,0,0.01);border:1px solid rgba(255,255,255,.9);margin-bottom:16px;overflow-x:auto;transition:all .3s cubic-bezier(.25,.8,.25,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.cb:hover{transform:translateY(-4px) scale(1.005);box-shadow:12px 12px 24px rgba(0,0,0,0.05),-12px -12px 24px rgba(255,255,255,0.9),inset 2px 2px 6px rgba(255,255,255,1),inset -2px -2px 6px rgba(0,0,0,0.02);}
.cb h3{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.cb h3 span{font-size:11px;color:var(--mu);font-weight:400;}
.c2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.ch{position:relative;height:300px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);border-bottom:2px solid var(--bd);}
td{padding:11px 12px;border-bottom:1px solid #F1F5F9;}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pg{background:#DCFCE7;color:#166534;}.py{background:#FEF9C3;color:#854D0E;}.pr{background:#FEE2E2;color:#991B1B;}.pb{background:#DBEAFE;color:#1E40AF;}
.fn-row{margin-bottom:14px;}
.fn-lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px;}
.fn-bar{height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;}
.fn-drop{text-align:center;font-size:12px;font-weight:700;color:var(--r);margin:8px 0;}
/* INSIGHT CARDS */
.ins{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;order:99;margin-top:8px;padding-top:20px;border-top:2px dashed var(--bd);}
.ins-head{order:98;margin-top:18px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);}
.ins-box{border-radius:20px;padding:20px 22px;border:1px solid rgba(255,255,255,0.9);border-left:6px solid;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .3s cubic-bezier(.25,.8,.25,1);box-shadow:8px 8px 20px rgba(0,0,0,0.03),-8px -8px 20px rgba(255,255,255,0.8),inset 2px 2px 4px rgba(255,255,255,0.9),inset -2px -2px 4px rgba(0,0,0,0.01);}
.ins-box:hover{transform:translateY(-4px) scale(1.01);box-shadow:12px 12px 24px rgba(0,0,0,0.05),-12px -12px 24px rgba(255,255,255,0.9),inset 2px 2px 6px rgba(255,255,255,1),inset -2px -2px 6px rgba(0,0,0,0.02);}
.ins-box.win{background:linear-gradient(135deg,rgba(240,253,244,0.9) 0%,rgba(240,253,244,0.3) 100%);border-left-color:var(--g);}
.ins-box.warn{background:linear-gradient(135deg,rgba(254,242,242,0.9) 0%,rgba(254,242,242,0.3) 100%);border-left-color:var(--r);}
.ins-box.act{background:linear-gradient(135deg,rgba(239,246,255,0.9) 0%,rgba(239,246,255,0.3) 100%);border-left-color:var(--b);}
.ins-box h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;font-weight:800;}
.ins-box.win h4{color:#166534;}.ins-box.warn h4{color:#991B1B;}.ins-box.act h4{color:#1E40AF;}
.ins-box ul{list-style:none;}
.ins-box li{font-size:12.5px;line-height:1.55;margin-bottom:8px;padding-left:16px;position:relative;color:#334155;}
.ins-box li:before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;}
.ins-box.win li:before{background:var(--g);}.ins-box.warn li:before{background:var(--r);}.ins-box.act li:before{background:var(--b);}
.note{background:#FFF7ED;border-left:4px solid var(--p);padding:12px 16px;border-radius:8px;font-size:12.5px;color:#7C2D12;margin-bottom:16px;}
.load-status{display:none;margin:14px 28px 0;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;}
.load-status.show{display:block;}
.load-status.loading{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;}
.load-status.error{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}
@media(max-width:780px){.kg,.kg5{grid-template-columns:1fr 1fr;}.c2,.c3,.ins{grid-template-columns:1fr;}}

/* ===== KAPEEFIT FIRST-LOAD SPLASH (namespaced kpl-) ===== */
#kpLoader{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#ffffff;overflow:hidden;transition:opacity .6s ease,visibility .6s ease;}
#kpLoader.kpl-hide{opacity:0;visibility:hidden;}
.kpl-corner{position:absolute;top:24px;left:28px;z-index:5;animation:kp-rise 1s ease both;}
.kpl-corner .kpl-t1{font-size:17px;font-weight:800;letter-spacing:1.5px;color:#1E293B;text-transform:uppercase;}
.kpl-corner .kpl-t1 b{color:#FF6B35;}
.kpl-corner .kpl-t2{font-size:13px;font-weight:600;color:#6B7280;margin-top:3px;letter-spacing:.3px;}
.kpl-iit{position:absolute;top:20px;right:26px;z-index:5;text-align:right;animation:kp-rise 1.1s ease .15s both;}
.kpl-iit img{height:60px;width:auto;display:block;margin-left:auto;}
.kpl-iit .kpl-cap{font-size:10px;font-weight:700;letter-spacing:1px;color:#6B7280;margin-bottom:3px;text-transform:uppercase;}
.kpl-logo-wrap{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;}
.kpl-logo-box{position:relative;overflow:hidden;border-radius:12px;padding:6px 16px;animation:kp-rise 1.05s cubic-bezier(.2,.8,.2,1) both,kp-float 4.2s ease-in-out 1s infinite;}
@keyframes kp-rise{0%{opacity:0;transform:translateY(18px) scale(.94)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes kp-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.kpl-logo-box img{display:block;width:min(560px,90vw);height:auto;}
.kpl-glint{position:absolute;top:0;left:-60%;width:48%;height:100%;background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.2) 38%,rgba(255,255,255,.9) 50%,rgba(255,255,255,.2) 62%,transparent 100%);transform:skewX(-18deg);animation:kp-sweep 3s ease-in-out 1.2s infinite;mix-blend-mode:overlay;pointer-events:none;}
@keyframes kp-sweep{0%{left:-60%}45%{left:130%}100%{left:130%}}
.kpl-sub{margin-top:16px;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#6B7280;animation:kp-rise 1s ease .25s both;}
.kpl-spin-wrap{position:relative;z-index:3;margin-top:32px;width:58px;height:58px;animation:kp-rise 1s ease .35s both;}
.kpl-spinner{width:58px;height:58px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0 25%,#F2C94C 55%,#FF6B35 100%);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 5px));mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 5px));animation:kp-spin 1s linear infinite;}
@keyframes kp-spin{to{transform:rotate(360deg)}}
.kpl-dot{position:absolute;top:1px;left:50%;width:8px;height:8px;margin-left:-4px;border-radius:50%;background:#FF6B35;transform-origin:4px 28px;animation:kp-spin 1s linear infinite;}
.kpl-bar{position:relative;z-index:3;margin-top:26px;width:260px;height:7px;border-radius:999px;background:rgba(30,41,59,.08);overflow:hidden;animation:kp-rise 1s ease .45s both;}
.kpl-bar::before{content:"";position:absolute;top:0;left:-40%;width:40%;height:100%;border-radius:999px;background:linear-gradient(90deg,#FF6B35,#F2C94C);animation:kp-load 1.6s cubic-bezier(.4,0,.2,1) infinite;}
@keyframes kp-load{0%{left:-40%}100%{left:120%}}
.kpl-status{position:relative;z-index:3;margin-top:18px;font-size:16px;font-weight:600;color:#1E293B;animation:kp-rise 1s ease .55s both;min-height:22px;}
.kpl-status .kpl-dots::after{content:"";animation:kp-dots 1.4s steps(4,end) infinite;}
@keyframes kp-dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}
.kpl-tag{position:absolute;bottom:28px;z-index:3;font-size:13px;color:#9AA3AF;letter-spacing:.5px;animation:kp-rise 1s ease .7s both;}
@media(max-width:640px){.kpl-iit img{height:42px}.kpl-corner .kpl-t1{font-size:14px}}

/* New styles for sticky header and glassmorphism */
.sticky-nav-wrapper { position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.shining-logo { position: relative; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; margin-right: 8px; }
.shining-logo::after { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); transform: skewX(-20deg); animation: shine-logo 3s infinite; mix-blend-mode: overlay; pointer-events: none; }
@keyframes shine-logo { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
</style>
<style id="sticky-fix">.tabs{position:sticky;top:0;z-index:200;box-shadow:none;}</style>
<style id="unified-pane">
.ctrl{border:none!important;box-shadow:none!important;padding-bottom:2px!important;}
.tabs{border:none!important;box-shadow:none!important;padding-top:2px!important;}
.tabs::-webkit-scrollbar{display:none!important;height:0!important;}
</style>

<style id="team-performance-ui">
/* ===== CLEAN TEAM PERFORMANCE UI ===== */
.team-overview{padding:20px!important;overflow:visible!important;}
.team-overview>h3{margin-bottom:16px!important;}
.team-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}
.team-panel{position:relative;overflow:hidden;border-radius:18px;padding:18px;background:linear-gradient(145deg,rgba(255,255,255,.86),rgba(255,255,255,.54));border:1px solid rgba(255,255,255,.96);box-shadow:0 10px 28px rgba(15,23,42,.055),inset 1px 1px 0 rgba(255,255,255,.9);}
.team-panel:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:18px 0 0 18px;}
.team-panel:after{content:"";position:absolute;right:-55px;top:-65px;width:180px;height:180px;border-radius:50%;opacity:.32;pointer-events:none;filter:blur(2px);}
.team-panel.sales:before{background:#D97706;}.team-panel.sales:after{background:radial-gradient(circle,rgba(245,158,11,.32),transparent 68%);}
.team-panel.doctors:before{background:#2563EB;}.team-panel.doctors:after{background:radial-gradient(circle,rgba(59,130,246,.30),transparent 68%);}
.team-panel:only-child{grid-column:1/-1;}
.team-panel-head{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;}
.team-head-left{display:flex;align-items:center;gap:11px;min-width:0;}
.team-icon{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:19px;border:1px solid rgba(255,255,255,.9);box-shadow:inset 1px 1px 0 rgba(255,255,255,.9);flex:0 0 auto;}
.team-panel.sales .team-icon{background:rgba(245,158,11,.13);}.team-panel.doctors .team-icon{background:rgba(37,99,235,.12);}
.team-kicker{font-size:10px;font-weight:900;letter-spacing:1px;color:var(--mu);line-height:1.1;}
.team-title{font-size:15px;font-weight:850;color:var(--tx);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-badge{flex:0 0 auto;padding:6px 10px;border-radius:999px;font-size:10.5px;font-weight:800;color:#475569;background:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.95);}
.team-metrics{position:relative;z-index:1;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.team-metric{min-width:0;padding:13px 12px;border-radius:14px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.92);box-shadow:inset 1px 1px 0 rgba(255,255,255,.85);}
.tm-label{font-size:9.5px;font-weight:850;text-transform:uppercase;letter-spacing:.75px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tm-value{font-size:20px;font-weight:900;color:var(--tx);margin:7px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tm-note{font-size:10px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-panel-footer{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(148,163,184,.18);font-size:10.5px;color:var(--mu);}
.team-panel-footer b{color:var(--tx);}
.doctor-roster-grid{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(190px,1fr))!important;gap:14px!important;}
.doctor-roster-grid .kpi{min-height:112px;padding:16px 18px;background:linear-gradient(145deg,rgba(255,255,255,.84),rgba(255,255,255,.5));}

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw7crt-w2PsfM8vXmV2RXXYq0fCCdgViZUYRSQSrYLPROOEiMzbyLRzfcEDKrRk6UfwRA/exec';
const CACHE_KEY = 'kamourDashboardData:v4';
const CACHE_MAX_AGE = 6 * 60 * 60 * 1000;
window.DATA = null;
let daily = [], months = [];
let selMonth = document.getElementById('selMonth');
let sd = document.getElementById('selDate');
let selFrom = document.getElementById('selFrom');
let selTo = document.getElementById('selTo');

Chart.defaults.font.family="'Segoe UI',system-ui,sans-serif";Chart.defaults.font.size=12;Chart.defaults.color='#64748B';
const INR=v=>'\u20B9'+Math.round(v).toLocaleString('en-IN');
const K=v=>'\u20B9'+(v/1000).toFixed(1)+'K';
const charts={};
function mk(id,cfg){if(charts[id])charts[id].destroy();const el=document.getElementById(id);if(el)charts[id]=new Chart(el,cfg);}
const MNAMES={'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
const FULLWD={Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};

function setStatus(type,msg){
  const s=document.getElementById('status');
  if(!s)return;
  s.className='load-status'+(type?' show '+type:'');
  s.textContent=msg||'';
}
function clearStatus(){setStatus('', '');}
function withCacheBust(url){return url+(url.includes('?')?'&':'?')+'t='+Date.now();}
function saveCachedData(json){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({savedAt:Date.now(),data:json}));}catch(e){}
}
function restoreCachedData(){
  try{
    const cached=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
    if(!cached||!cached.data||Date.now()-cached.savedAt>CACHE_MAX_AGE)return false;
    window.DATA=cached.data;
    initDataControls();
    render();
    clearStatus();
    if(window.kpHideLoader)kpHideLoader();
    return true;
  }catch(e){return false;}
}
function monthLabel(ym){return (MNAMES[ym.slice(5)]||ym.slice(5))+' '+ym.slice(0,4);}
function rangeDays(from,to){return Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000)+1;}
function fmtDateLong(dt){return dt?new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';}
function initDataControls(){
  daily=Array.isArray(window.DATA?.daily)?window.DATA.daily:[];
  daily.sort((a,b)=>String(a.date).localeCompare(String(b.date)));

  // IMPORTANT FIX:
  // Month/date controls now use dates from Daily + Flipkart + Kamour.in.
  // Earlier they used only Daily Sales Report dates, so June Flipkart/Kamour data
  // was hidden when Daily Sales Report had only January dates.
  const allDates=[...new Set([...(Array.isArray(window.DATA?.daily)?window.DATA.daily:[]),
    ...(Array.isArray(window.DATA?.flipkart)?window.DATA.flipkart:[]),
    ...(Array.isArray(window.DATA?.kamour)?window.DATA.kamour:[]),
    ...(Array.isArray(window.DATA?.cga)?window.DATA.cga:[]),
    ...(Array.isArray(window.DATA?.doctorSales)?window.DATA.doctorSales:[]),
    ...(Array.isArray(window.DATA?.misc)?window.DATA.misc:[])]
    .map(r=>String(r.date||''))
    .filter(d=>/^\d{4}-\d{2}-\d{2}$/.test(d)))].sort();

  months=[...new Set(allDates.map(d=>d.slice(0,7)))].sort();
  const prevMonth=selMonth.value, prevDate=sd.value;
  selMonth.innerHTML='';
  months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=monthLabel(m);selMonth.appendChild(o);});
  if(months.length){selMonth.value=months.includes(prevMonth)?prevMonth:months[months.length-1];}

  if(allDates.length){
    const first=allDates[0], last=allDates[allDates.length-1];
    sd.min=first;sd.max=last;sd.value=prevDate&&allDates.includes(prevDate)?prevDate:last;

    const pf=selFrom.value, pt=selTo.value;
    selFrom.min=first;selFrom.max=last;selTo.min=first;selTo.max=last;
    const latestYm=last.slice(0,7);
    const monthFirst=allDates.find(d=>d.slice(0,7)===latestYm)||first;
    selFrom.value=pf&&pf>=first&&pf<=last?pf:monthFirst;
    selTo.value=pt&&pt>=first&&pt<=last?pt:last;
    if(selFrom.value>selTo.value)selFrom.value=selTo.value;
  }
}
async function loadData(opts={}) {
  const background=!!opts.background;
  const firstLoad=!window.DATA;
  if(firstLoad)setStatus('loading','Loading latest dashboard data...');
  else if(!background)setStatus('loading','Refreshing dashboard data...');
  try{
    const apiSep=API_URL.indexOf('?')>-1?'&':'?';
    const response = await fetch(API_URL+apiSep+'_ts='+Date.now(), {method:'GET', cache:'no-store'});
    const raw = await response.text();
    if(!response.ok) throw new Error('HTTP '+response.status+' — '+raw.slice(0,160));
    let json;
    try{json=JSON.parse(raw);}catch(e){throw new Error('API did not return JSON. Response starts with: '+raw.slice(0,200));}
    if(json.error) throw new Error(json.message||'Apps Script returned an error');
    if(json.error || json.ok===false) throw new Error(json.message || 'Apps Script returned an error. Open the Web App URL directly to see details.');
    if(!Array.isArray(json.daily)) json.daily=[];
    if(!json.settlement) json.settlement={};
    if(!json.warrior) json.warrior={totals:{},warriors:[],stores:[],products:[],saletype:[],monthly:[],records:[]};
    if(!Array.isArray(json.flipkart)) json.flipkart=[];
    if(!Array.isArray(json.kamour)) json.kamour=[];
    if(!Array.isArray(json.cga)) json.cga=[];
    if(!Array.isArray(json.doctorSales)) json.doctorSales=[];
    if(!Array.isArray(json.misc)) json.misc=[];
    window.DATA = json;
    saveCachedData(json);
    initDataControls();
    if(!background)clearStatus();
    render();
    if(window.kpHideLoader)kpHideLoader();
  }catch(err){
    console.error('Dashboard API load failed:',err);
    const msg='Data load failed: '+err.message;
    if(!background||!window.DATA)setStatus('error',msg);
    if(window.kpHideLoader)kpHideLoader();
    if(!window.DATA){
      document.getElementById('area').innerHTML='<div class="note"><b>Dashboard data could not be loaded.</b><br>'+msg+'</div>';
    }
  }
}

function hasMeaningfulDailyData_(r){
  if(!r)return false;
  var fields=[
    'reactivation_hot','elementor','meta','ai','wati','justdial',
    'salesteam','direct','reactivation_consult','cons',
    'new','repeat','reactivation_med','med','ecom',
    'kapeefit','kamour','flipkart','amazon','chatrec','indiamart',
    'consamt','ordamt','ecomamt','leads','rev'
  ];
  return fields.some(function(key){
    var value=r[key];
    if(value===null||value===undefined||value==='')return false;
    var num=Number(String(value).replace(/,/g,'').trim());
    return Number.isFinite(num)&&num!==0;
  });
}
function selectionHasDailyData(){

function funnelSVG(stages){
  var colors=['#2563EB','#7C3AED','#16A34A','#FF6B35','#0D9488','#DC2626'];
  // Keep every stage wide enough for its label so smaller funnel levels stay readable.
  var stageH=54, gap=8, minW=122, maxW=240, leftPad=82, padTop=8;
  var cx=leftPad+maxW/2+14;
  var maxVal=Math.max.apply(null,stages.map(function(s){return +s.value||0;}))||1;
  var H=stages.length*stageH+(stages.length-1)*gap+padTop*2;
  var svg='<svg viewBox="0 0 480 '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:480px; height:auto; display:block; margin:0 auto; overflow:visible; font-family:inherit;">';
  var y=padTop;
  function wFor(v){var r=v/maxVal;return minW+(maxW-minW)*Math.max(0,Math.min(1,r));}
  for(var i=0;i<stages.length;i++){
    var val=+stages[i].value||0;
    var prevVal=i===0?val:(+stages[i-1].value||0);
    var wTop=wFor(prevVal),wBot=wFor(val);
    var xTL=cx-wTop/2,xTR=cx+wTop/2,xBL=cx-wBot/2,xBR=cx+wBot/2;
    var yT=y,yB=y+stageH;
    var color=colors[i%colors.length];
    var label=stages[i].shortLabel||stages[i].label;
    svg+='<polygon points="'+xTL+','+yT+' '+xTR+','+yT+' '+xBR+','+yB+' '+xBL+','+yB+'" fill="'+color+'" opacity="0.96"/>';
    svg+='<text x="'+cx+'" y="'+(y+stageH/2-6)+'" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="800">'+label+'</text>';
    svg+='<text x="'+cx+'" y="'+(y+stageH/2+13)+'" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" opacity="0.98">'+Math.round(val)+'</text>';
    if(i<stages.length-1){
      var nextVal=+stages[i+1].value||0;
      var lossPct=val?((val-nextVal)/val*100):0;
      var convPct=val?(nextVal/val*100):0;
      svg+='<text x="'+(leftPad-7)+'" y="'+(yB+5)+'" text-anchor="end" fill="#DC2626" font-size="11.5" font-weight="800">-'+lossPct.toFixed(1)+'% lost</text>';
      svg+='<text x="'+(cx+maxW/2+12)+'" y="'+(yB+5)+'" text-anchor="start" fill="#16A34A" font-size="11.5" font-weight="800">↓ '+convPct.toFixed(1)+'% converted</text>';
    }
    y+=stageH+gap;
  }
  svg+='</svg>';
  return svg;
}

function daysInYM(ym){return new Date(+ym.slice(0,4),+ym.slice(5),0).getDate();}

function computeTotalRevenueParts(from,to){
  var lo=(from&&from>REVENUE_START_DATE)?from:REVENUE_START_DATE;

function computeSelectedRevenue(scope){

  var dailyCutoff=to<REVENUE_START_DATE?to:previousDay;

  }

function liveSpendForDate(dt){

  return {cga:cga,flipkart:flipkart,kamour:kamour};

function rangeSpend(from,to){
  const out={google:0,meta:0,cga:0,flipkart:0,kamour:0,total:0,days:0,fixedDays:0,liveDays:0};
  if(!from||!to)return out;
  let d=new Date(from+'T00:00:00'), end=new Date(to+'T00:00:00');
  if(d>end){const tmp=d;d=end;end=tmp;}
  while(d<=end){
    const dt=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const ym=dateYM(d), fixed=AD_SPEND_MONTHLY[ym];
    if(fixed){
      const dim=daysInYM(ym);
      out.google+=(+fixed.google||0)/dim;
      out.meta+=(+fixed.meta||0)/dim;
      out.flipkart+=(+fixed.flipkart||0)/dim;
      out.fixedDays++;
    }else{
      const live=liveSpendForDate(dt);
      out.cga+=live.cga;out.flipkart+=live.flipkart;out.kamour+=live.kamour;
      if(live.cga||live.flipkart||live.kamour)out.liveDays++;
    }
    out.days++;d=addDays(d,1);
  }
  out.total=adSum(out);return out;
}

function render(){const a=document.getElementById('area');
  if(!window.DATA){a.innerHTML='<div class="note">Loading dashboard data...</div>';return;}
  buildTabs();
  Object.keys(charts).forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}});
  let recs, scope, label;
  if(mode==='day'){
    const dt=sd.value;recs=daily.filter(d=>d.date===dt);scope='day';
    const full=new Date(dt+'T00:00:00');const wd=recs[0]?FULLWD[recs[0].wd]:full.toLocaleDateString('en',{weekday:'long'});
    document.getElementById('wdBadge').textContent='\uD83D\uDDD3\uFE0F '+wd;
    label=full.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    document.getElementById('sub').textContent=label+' \u00B7 '+wd;
    if(!recs.length && ['tr','sr','fn','mt'].includes(tab)){a.innerHTML='<div class="note">Is date ka Daily Sales Report data available nahi hai.</div>';return;}
  } else if(mode==='range'){
    let from=selFrom.value, to=selTo.value;
    if(from&&to&&from>to){const t=from;from=to;to=t;selFrom.value=from;selTo.value=to;}
    document.getElementById('rangeBadge').textContent=from&&to?('\uD83D\uDDD3\uFE0F '+rangeDays(from,to)+' days'):'';
    recs=daily.filter(d=>d.date>=from&&d.date<=to);scope='range';
    const f=fmtDateLong(from), t=fmtDateLong(to);
    label=f+' \u2192 '+t;
    document.getElementById('sub').textContent=label+' \u00B7 '+recs.length+' days \u00B7 All figures in \u20B9';
    if(!from||!to){a.innerHTML='<div class="note">From aur To dono date select karo.</div>';return;}
    if(!recs.length && ['tr','sr','fn','mt'].includes(tab)){a.innerHTML='<div class="note">Is range ('+label+') ka Daily Sales Report data available nahi hai.</div>';return;}
  } else {
    const ym=selMonth.value;recs=daily.filter(d=>d.date.slice(0,7)===ym);scope='month';
    label=monthLabel(ym);
    document.getElementById('sub').textContent=label+' \u00B7 '+recs.length+' days \u00B7 All figures in \u20B9';
  }
  const A=agg(recs);
  const R={ov:renderOv,cga:renderCGA,tr:renderTr,ads:renderAds,sr:renderSr,fn:renderFn,dr:renderDr,st:renderSt,mt:renderMt,fk:renderFk,km:renderKm,misc:renderMisc,wr:renderWarrior};
  R[tab](a,A,recs,scope,label);
}

function cgaAgg(rows){
  var o={clicks:0,conversions:0,adSpend:0,impressions:0,totalLeads:0,
    reactivationHot:0,elementor:0,metaLeads:0,aiChatbot:0,wati:0,justdial:0,
    salesTeam:0,direct:0,reactivationBooking:0,totalBookings:0,consultAmt:0,
    consultDone:0,rxCreated:0,
    newOrders:0,repeatOrders:0,reactivationMedOrder:0,totalMedOrders:0,ordersAmt:0,
    pendingConsult:0,pendingMedOrder:0,
    rtoOrders:0,rtoAmount:0,products:{}};
  rows.forEach(function(r){
    o.clicks+=+r.clicks||0;o.conversions+=+r.conversions||0;o.adSpend+=+r.adSpend||0;o.impressions+=+r.impressions||0;
    o.reactivationHot+=+r.reactivationHot||0;o.elementor+=+r.elementor||0;o.metaLeads+=+r.metaLeads||0;
    o.aiChatbot+=+r.aiChatbot||0;o.wati+=+r.wati||0;o.justdial+=+r.justdial||0;o.totalLeads+=+r.totalLeads||0;
    o.salesTeam+=+r.salesTeam||0;o.direct+=+r.direct||0;o.reactivationBooking+=+r.reactivationBooking||0;
    o.totalBookings+=+r.totalBookings||0;o.consultAmt+=+r.consultAmt||0;
    o.consultDone+=+r.consultDone||0;o.rxCreated+=+r.rxCreated||0;
    o.newOrders+=+r.newOrders||0;o.repeatOrders+=+r.repeatOrders||0;
    o.reactivationMedOrder+=+r.reactivationMedOrder||0;o.totalMedOrders+=+r.totalMedOrders||0;o.ordersAmt+=+r.ordersAmt||0;
    // Pending rows are end-of-day snapshots, not daily flow. Keep the latest selected value.
    o.pendingConsult=+r.pendingConsult||0;o.pendingMedOrder=+r.pendingMedOrder||0;
    // RTO is a period flow, so it is summed across selected dates.
    o.rtoOrders+=+r.rtoOrders||0;o.rtoAmount+=+r.rtoAmount||0;
    var p=r.products||{};Object.keys(p).forEach(function(k){o.products[k]=(o.products[k]||0)+(+p[k]||0);});
  });
  return o;
}

function getDoctorSalesData(scope){

  var agg={};

    Object.keys(rec.doctors||{}).forEach(function(name){
      var d=rec.doctors[name];
      if(!agg[name])agg[name]={name:name,type:d.type||'doctor',cons:0,consNew:0,consRep:0,med:0,medNew:0,medRep:0,amt:0};
      agg[name].cons+=+d.cons||0;agg[name].consNew+=+d.consNew||0;agg[name].consRep+=+d.consRep||0;

function renderDr(a,A,recs,scope,label){
  // Try new doctorSales data first, fallback to old daily-based docs
  var dsData=getDoctorSalesData(scope);
  var allEntries=Object.values(dsData.agg);
  var docEntries=allEntries.filter(function(d){return d.type==='doctor';});
  var salesTeamEntry=allEntries.filter(function(d){return d.type==='salesteam';})[0]||null;
  // Fallback to old data if doctorSales empty
  if(!docEntries.length && A.docs){
    var hasOldDoc=Object.values(A.docs).some(function(d){return d.cons>0;});
    if(hasOldDoc){
      docEntries=Object.entries(A.docs).map(function(e){return{name:e[0],type:'doctor',cons:e[1].cons||0,consNew:0,consRep:0,med:e[1].med||0,medNew:0,medRep:0,amt:e[1].amt||0,conv:e[1].cons?(e[1].med/e[1].cons*100):0,aov:e[1].med?(e[1].amt/e[1].med):0};});
    }
  }
  if(!docEntries.length){a.innerHTML='<div class="note">\u26A0\uFE0F <b>'+label+'</b> ke liye doctor-wise data available nahi hai. Doctor & Sales Report tab fill karo.</div>';return;}
  docEntries.sort(function(x,y){return y.cons-x.cons;});
  var top=docEntries[0];var weak=docEntries.filter(function(d){return d.cons>0;}).sort(function(x,y){return x.conv-y.conv;})[0];
  var inactive=docEntries.filter(function(d){return d.cons===0;}).map(function(d){return 'Dr. '+d.name;});
  var totalDocCons=docEntries.reduce(function(s,d){return s+d.cons;},0);
  var totalDocMed=docEntries.reduce(function(s,d){return s+d.med;},0);

    [weak?'Sabse kam conversion: Dr. '+weak.name+' ('+weak.conv.toFixed(1)+'%).':'Conversion gap monitor karo.',inactive.length?'Inactive: '+inactive.join(', ')+'.':'Load distribution dekho.'],

  });

    var stTop2=salesTeamEntry;
    var gST=stTop2.conv>=28?'pg':stTop2.conv>=15?'py':'pr';

function n0(v){const n=Number(v||0);return Number.isFinite(n)?n:0;}
function safePct(a,b){return b?(a/b*100):0;}
function addWGroup(obj,key,amount){
  key=key||'Unknown';
  if(!obj[key])obj[key]={name:key,orders:0,revenue:0,aov:0};
  obj[key].orders+=1;obj[key].revenue+=amount;obj[key].aov=obj[key].orders?Math.round(obj[key].revenue/obj[key].orders):0;
}
function buildWarriorSummary(records){
  const T={from:'',to:'',revenue:0,orders:0,warriors:0,aov:0,direct:0,prescription:0,new:0,repeat:0,doc_yes:0};
  const byWarrior={},byStore={},byProduct={},bySaleType={},byMonth={},byDay={},warriorSet={};
  (records||[]).forEach(r=>{
    const date=String(r.date||''); if(!date)return;
    const ym=date.slice(0,7), amount=n0(r.amount);
    const store=String(r.store||'Unknown Store');
    const warrior=String(r.warrior||'Unknown Warrior');
    const saleType=String(r.saleType||'Unknown');
    const firstRepeat=String(r.firstRepeat||'');
    const doctorInvolved=String(r.doctorInvolved||'');
    if(!T.from||date<T.from)T.from=date;if(!T.to||date>T.to)T.to=date;
    T.orders+=1;T.revenue+=amount;
    if(/direct/i.test(saleType))T.direct+=1;
    if(/prescription/i.test(saleType))T.prescription+=1;
    if(/repeat/i.test(firstRepeat))T.repeat+=1;else T.new+=1;
    if(/^y|yes/i.test(doctorInvolved))T.doc_yes+=1;
    warriorSet[warrior]=true;
    addWGroup(byWarrior,warrior,amount);addWGroup(byStore,store,amount);addWGroup(bySaleType,saleType,amount);
    if(!byMonth[ym])byMonth[ym]={ym:ym,orders:0,revenue:0,aov:0};byMonth[ym].orders+=1;byMonth[ym].revenue+=amount;byMonth[ym].aov=Math.round(byMonth[ym].revenue/byMonth[ym].orders);
    if(!byDay[date])byDay[date]={date:date,orders:0,revenue:0,aov:0};byDay[date].orders+=1;byDay[date].revenue+=amount;byDay[date].aov=Math.round(byDay[date].revenue/byDay[date].orders);
    const products=r.products||{};let rowUnits=0;Object.keys(products).forEach(k=>rowUnits+=n0(products[k]));
    Object.keys(products).forEach(k=>{const units=n0(products[k]);if(!units)return;if(!byProduct[k])byProduct[k]={name:k,units:0,revenue:0};byProduct[k].units+=units;byProduct[k].revenue+=rowUnits?amount*(units/rowUnits):0;});
  });
  T.warriors=Object.keys(warriorSet).length;T.aov=T.orders?Math.round(T.revenue/T.orders):0;
  const round=o=>{const x={};Object.keys(o||{}).forEach(k=>{x[k]=typeof o[k]==='number'?Math.round(o[k]):o[k];});return x;};
  return {
    totals:round(T),
    warriors:Object.keys(byWarrior).map(k=>round(byWarrior[k])).sort((a,b)=>b.revenue-a.revenue),
    stores:Object.keys(byStore).map(k=>round(byStore[k])).sort((a,b)=>b.revenue-a.revenue),
    products:Object.keys(byProduct).map(k=>round(byProduct[k])).sort((a,b)=>b.units-a.units),
    saletype:Object.keys(bySaleType).map(k=>round(bySaleType[k])).sort((a,b)=>b.revenue-a.revenue),
    monthly:Object.keys(byMonth).sort().map(k=>round(byMonth[k])),
    daily:Object.keys(byDay).sort().map(k=>round(byDay[k]))
  };
}

    ${W.warriors.map((w,i)=>`<tr><td>${i+1}</td><td><b>${w.name}</b></td><td>${w.orders}</td><td><b>${INR(w.revenue)}</b></td><td>${INR(w.aov)}</td><td>${safePct(w.revenue,T.revenue).toFixed(1)}%</td></tr>`).join('')}
    </tbody></table></div>`;
  mk('wLead',{type:'bar',data:{labels:W.warriors.map(w=>w.name),datasets:[{data:W.warriors.map(w=>w.revenue),backgroundColor:'#FF6B35',borderRadius:6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+INR(c.parsed.x)}}},scales:{x:{ticks:{callback:v=>K(v)},grid:{color:'rgba(0,0,0,.05)'}},y:{grid:{display:false}}}}});
  mk('wStore',{type:'doughnut',data:{labels:W.stores.map(s=>`${s.name} (${s.orders})`),datasets:[{data:W.stores.map(s=>s.revenue),backgroundColor:['#7C3AED','#2563EB','#16A34A','#D97706','#FF6B35'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>' '+INR(c.parsed)}}}}});
  mk('wProd',{type:'bar',data:{labels:W.products.map(p=>p.name+' ('+p.units+')'),datasets:[{data:W.products.map(p=>p.units),backgroundColor:'#0D9488',borderRadius:6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'rgba(0,0,0,.05)'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});
  mk('wType',{type:'doughnut',data:{labels:W.saletype.map(s=>`${s.name} (${s.orders})`),datasets:[{data:W.saletype.map(s=>s.revenue),backgroundColor:['#16A34A','#FF6B35','#2563EB'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>' '+INR(c.parsed)}}}}});
  mk('wMonth',{data:{labels:trendLabels,datasets:[
    {type:'bar',label:'Revenue',data:trend.map(x=>x.revenue),backgroundColor:'#7C3AED',borderRadius:6,yAxisID:'y'},
    {type:'line',label:'Orders',data:trend.map(x=>x.orders),borderColor:'#FF6B35',tension:.4,pointRadius:4,yAxisID:'y1'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>c.dataset.label==='Revenue'?'Revenue: '+INR(c.parsed.y):'Orders: '+c.parsed.y}}},scales:{y:{position:'left',ticks:{callback:v=>K(v)},grid:{color:'rgba(0,0,0,.05)'}},y1:{position:'right',beginAtZero:true,grid:{display:false},title:{display:true,text:'Orders'}},x:{grid:{display:false},ticks:{maxTicksLimit:15}}}}});
}
const hasCachedData=restoreCachedData();
setTimeout(()=>updateModePill(true),0);
loadData({background:hasCachedData});
setInterval(()=>loadData({background:true}), 300000);
</script>
